function isAss(l){return ASSICURATI.has((l||'').trim().toLowerCase());}
function getArea(med,prest){
  if(!med)return null;
  const m=med.trim().toLowerCase(), p=(prest||'').toLowerCase();
  if(m.includes('veloccia'))return p.includes('osteopat')?'Fisioterapia':null;
  for(const[area,list]of Object.entries(MEDICI)){for(const x of list){if(m===x||m.includes(x)||x.includes(m))return area;}}
  return null;
}
function elaMain(data){
  const r={};AREE.filter(a=>a!=='Laboratorio').forEach(a=>{r[a]={t:0,p:0,a:0};});
  data.forEach(row=>{
    if((row['Stato']||'').trim().toLowerCase()==='prenotata')return;
    const area=getArea(row['Medici']||'',row['Prestazione']||'');
    if(!area)return; r[area].t++;
    if(isAss(row['Listino']||''))r[area].a++;else r[area].p++;
  });
  return r;
}
function elaLab(data){
  const map=new Map();
  data.forEach(row=>{const id=row['N. Assegnazione'];if(id&&!map.has(id))map.set(id,row['Listino']||'');});
  let t=0,p=0,a=0;map.forEach(l=>{t++;if(isAss(l))a++;else p++;});
  return{t,p,a};
}

  const [pL,setPL]=useState('');const[pT,setPT]=useState('s');const[pMe,setPMe]=useState('');const[pTx,setPTx]=useState('');const[pSt,setPSt]=useState(null);

  useEffect(()=>{
    const t=new Date();const dow=t.getDay();const mon=new Date(t);mon.setDate(t.getDate()+(dow===0?-6:1-dow));const sun=new Date(mon);sun.setDate(mon.getDate()+6);
    setWs(mon.toISOString().slice(0,10));setWe(sun.toISOString().slice(0,10));
    const n=new Date();const pm=new Date(n.getFullYear(),n.getMonth()-1,1);
    setRm(n.toISOString().slice(0,7));setCm(pm.toISOString().slice(0,7));
  },[]);

  const prevM=storM.find(s=>s.mese===cm);

  async function hFile(e,setter,nSetter){const f=e.target.files[0];if(!f)return;nSetter(f.name);try{const d=await readXlsx(f);setter(d);}catch(err){alert('Errore: '+err.message);}}

  function calcola(){if(!fM||!fL)return;const aree=elaMain(fM);aree['Laboratorio']=elaLab(fL);const tot=calcTot(aree);setCal({aree,tot});}
  function calcolaM(){
    if(!fMM||!fML){alert('Carica i file del mese corrente.');return;}
    if(!prevM&&(!fPM||!fPL)){alert('Carica i file del mese precedente.');return;}
    const curr=elaMain(fMM);curr['Laboratorio']=elaLab(fML);curr._tot=calcTot(curr);
    const prev=prevM?{...prevM.aree,_tot:prevM.tot}:(()=>{const p=elaMain(fPM);p['Laboratorio']=elaLab(fPL);p._tot=calcTot(p);return p;})();
    setCalM({curr,prev});
  }

  function salvaSett(){if(!cal)return;const lbl=ws&&we?fmtD(ws)+' — '+fmtD(we):'Sett. '+new Date().toLocaleDateString('it-IT');const n=[...stor];if(!n.find(s=>s.label===lbl)){n.push({label:lbl,aree:cal.aree,tot:cal.tot});setStor(n);saveS(n);}alert('✓ Salvato.');}
  function salvaM2(){if(!calM||!rm){alert('Seleziona il mese.');return;}_salvaM(rm,calM.curr);alert('✓ Salvato.');}
  function _salvaM(mese,curr){const tot=curr._tot||calcTot(curr);const rec={mese,label:fmtM(mese),aree:curr,tot};const n=storM.filter(s=>s.mese!==mese);n.push(rec);n.sort((a,b)=>a.mese.localeCompare(b.mese));setStorM(n);saveM(n);}

  function parseAree(testo){const aree={};AREE.forEach(a=>{aree[a]={t:0,p:0,a:0};});const lines=testo.split(/[\r\n]+/);lines.forEach(line=>{const ll=line.toLowerCase().trim();if(!ll||ll.startsWith('totale')||ll.includes('macroarea'))return;for(const area of AREE){if(ll.includes(area.toLowerCase())){const n=(line.match(/\d+/g)||[]).map(Number);if(n.length>=1){aree[area]={t:n[0],p:n[1]??n[0],a:n[2]??0};}break;}}});let tot={t:0,p:0,a:0};const tl=lines.find(l=>l.trim().toLowerCase().startsWith('totale'));if(tl){const n=(tl.match(/\d+/g)||[]).map(Number);if(n.length>=1)tot={t:n[0],p:n[1]??n[0],a:n[2]??0};}else{AREE.forEach(a=>{tot.t+=aree[a].t;tot.p+=aree[a].p;tot.a+=aree[a].a;});}return{aree,tot};}

  function salvaManuale(){
    if(!pTx.trim()){setPSt({t:'w',m:'Incolla i dati prima.'});return;}if(!pL.trim()){setPSt({t:'w',m:'Inserisci il periodo.'});return;}
    const{aree,tot}=parseAree(pTx);const chk=AREE.reduce((s,a)=>s+aree[a].t,0);
    if(chk===0){setPSt({t:'e',m:'Non riesco a leggere i dati.'});return;}
    if(pT==='s'){const n=[...stor];if(n.find(s=>s.label===pL)){setPSt({t:'w',m:'Periodo già presente.'});return;}n.push({label:pL,aree,tot});setStor(n);saveS(n);setPSt({t:'ok',m:'✓ Salvato! Tot: '+tot.t});}
    else{if(!pMe){setPSt({t:'w',m:'Seleziona il mese.'});return;}_salvaM(pMe,{...aree,_tot:tot});setPSt({t:'ok',m:'✓ '+fmtM(pMe)+' — '+tot.t+' acc.'});}
    setTimeout(()=>{setPTx('');setPL('');setPSt(null);},3000);
  }

  function buildPS(){const periodo=ws&&we?fmtD(ws)+' — '+fmtD(we):'settimana corrente';const prev=stor.length>0?stor[stor.length-1]:null;const da=AREE.map(a=>a+': totale '+cal.aree[a].t+', privati '+cal.aree[a].p+', assicurati '+cal.aree[a].a).join('\n');const dp=prev?'SETTIMANA PRECEDENTE ('+prev.label+'):\nTotale: '+prev.tot.t+', Privati: '+prev.tot.p+', Assicurati: '+prev.tot.a+'\n'+AREE.map(a=>a+': totale '+((prev.aree[a]||{}).t||0)+', privati '+((prev.aree[a]||{}).p||0)+', assicurati '+((prev.aree[a]||{}).a||0)).join('\n'):'DATI SETTIMANA PRECEDENTE: non disponibili';return 'Sei un analista sanitario senior per S-Medical Group. Genera un audit settimanale completo in italiano.\n\n# AREA FRONT OFFICE S-MEDICAL — SETTIMANA '+periodo.toUpperCase()+' — SVILUPPO ATTIVITÀ E RISULTATI\n\n# 1. PREMESSA\n# 2. OBIETTIVI\n# 3. RISULTATI\n**1. Sintesi** (dati correnti e precedenti, variazioni %)\n**2. Per MacroArea**\n**3. Peso %**\n**Punti Positivi**\n# 4. DIFFICOLTÀ\n# 5. TREND\n# 6. SUGGERIMENTI (A-E)\n# 7. PRIORITÀ\n# 8. CONCLUSIONE\n\n---\nDATI CORRENTI ('+periodo+'):\nTotale: '+cal.tot.t+', Privati: '+cal.tot.p+', Assicurati: '+cal.tot.a+'\n'+da+'\n\n'+dp+(noteS?'\n\nNOTE:\n'+noteS:'');}
  function buildPM(){const dC=AREE.map(a=>a+': '+calM.curr[a].t+' (priv: '+calM.curr[a].p+', ass: '+calM.curr[a].a+')').join('\n');const dP=AREE.map(a=>a+': '+((calM.prev[a]||{}).t||0)+' (priv: '+((calM.prev[a]||{}).p||0)+', ass: '+((calM.prev[a]||{}).a||0)+')').join('\n');return 'Sei un analista sanitario senior per S-Medical Group. Genera un audit MENSILE completo in italiano.\n\n# AREA FRONT OFFICE S-MEDICAL — MENSILE '+fmtM(rm).toUpperCase()+'\n\n# 1. PREMESSA\n# 2. OBIETTIVI\n# 3. RISULTATI\n# 4. DIFFICOLTÀ\n# 5. TREND\n# 6. SUGGERIMENTI (A-F)\n# 7. PRIORITÀ\n# 8. CONCLUSIONE\n\n---\nMESE CORRENTE ('+fmtM(rm)+'):\nTotale: '+calM.curr._tot.t+', Privati: '+calM.curr._tot.p+', Assicurati: '+calM.curr._tot.a+'\n'+dC+'\n\nMESE PRECEDENTE ('+fmtM(cm)+'):\n'+dP+(noteM?'\n\nNOTE:\n'+noteM:'');}

  async function genera(tipo){
    if(!ak||!ak.startsWith('sk-ant-')){alert('Inserisci API Key nella tab Impostazioni.');setTab('imp');return;}
    setGen(true);const steps=['Preparazione...','Invio a Claude...','Generazione...','Formattazione...','Finalizzazione...'];let si=0;setGenSt(steps[0]);
    const iv=setInterval(()=>{si++;if(si<steps.length)setGenSt(steps[si]);},2500);
    try{
      const res=await fetch('https://api.anthropic.com/v1/messages',{method:'POST',headers:{'Content-Type':'application/json','x-api-key':ak,'anthropic-version':'2023-06-01'},body:JSON.stringify({model:'claude-sonnet-4-20250514',max_tokens:4000,messages:[{role:'user',content:tipo==='sett'?buildPS():buildPM()}]})});
      const data=await res.json();if(data.error)throw new Error(data.error.message);
      const testo=data.content?.[0]?.text||'';if(!testo)throw new Error('Risposta vuota');
      clearInterval(iv);setGen(false);
      const sfx=tipo==='sett'&&ws?ws+'_'+we:(rm||new Date().toISOString().slice(0,7));
      dlTxt(testo,tipo==='sett'?'AUDIT_SMEDICAL_'+sfx+'.txt':'AUDIT_MENSILE_SMEDICAL_'+sfx+'.txt');
      if(tipo==='sett'&&cal){const lbl=ws&&we?fmtD(ws)+' — '+fmtD(we):'Sett. '+new Date().toLocaleDateString('it-IT');const n=[...stor];if(!n.find(s=>s.label===lbl)){n.push({label:lbl,aree:cal.aree,tot:cal.tot});setStor(n);saveS(n);}}
      if(tipo==='mens'&&calM&&rm)_salvaM(rm,calM.curr);
      alert('✓ Audit generato!');
    }catch(err){clearInterval(iv);setGen(false);alert('Errore: '+err.message);}
  }

  const ts=(id)=>({flex:1,padding:'9px 12px',border:'none',background:tab===id?'#fff':'transparent',borderRadius:6,fontSize:13,fontWeight:600,color:tab===id?blu:txt2,cursor:'pointer',boxShadow:tab===id?'0 1px 3px rgba(0,0,0,.1)':'none',fontFamily:'inherit'});

  return <div style={{background:'#f7f6f2',minHeight:'100vh',fontFamily:'"Helvetica Neue",Arial,sans-serif',color:'#1a1a18'}}>
    <div style={{background:blu,color:'#fff',padding:'16px 24px',display:'flex',alignItems:'center',gap:14,borderBottom:'3px solid #163c6e'}}>
      <div style={{width:38,height:38,background:'#fff',borderRadius:7,display:'flex',alignItems:'center',justifyContent:'center',fontWeight:700,fontSize:13,color:blu,flexShrink:0}}>SM</div>
      <div><div style={{fontSize:17,fontWeight:700}}>S-Medical Group — Piattaforma Audit Front Office</div><div style={{fontSize:12,opacity:.75,marginTop:2}}>Generazione automatica degli audit settimanali e mensili</div></div>
    </div>
    {gen&&<div style={{position:'fixed',inset:0,background:'rgba(0,0,0,.5)',zIndex:1000,display:'flex',alignItems:'center',justifyContent:'center'}}><div style={{background:'#fff',borderRadius:12,padding:36,textAlign:'center',maxWidth:340,width:'90%'}}><div style={{width:36,height:36,border:'3px solid #e0ddd6',borderTopColor:blu,borderRadius:'50%',margin:'0 auto 14px',animation:'spin .8s linear infinite'}}/><div style={{fontSize:15,fontWeight:700,marginBottom:6}}>Generazione...</div><div style={{fontSize:13,color:txt2}}>{genSt}</div></div></div>}
    <div style={{maxWidth:920,margin:'0 auto',padding:'24px 16px'}}>
      <div style={{display:'flex',gap:2,background:surf2,borderRadius:10,padding:4,marginBottom:22,border:`1px solid ${bord}`}}>
        {[['sett','📊 Settimanale'],['mens','📅 Mensile'],['stor','🗂 Storico'],['imp','⚙️ Impostazioni']].map(([id,lbl])=><button key={id} style={ts(id)} onClick={()=>setTab(id)}>{lbl}</button>)}
      </div>

      {tab==='sett'&&<>
        <div style={cs.card}><div style={cs.ct}>Periodo</div><div style={cs.g2}><div><label style={cs.lbl}>Data inizio</label><input type="date" value={ws} onChange={e=>setWs(e.target.value)} style={cs.inp}/></div><div><label style={cs.lbl}>Data fine</label><input type="date" value={we} onChange={e=>setWe(e.target.value)} style={cs.inp}/></div></div></div>
        <div style={cs.card}><div style={cs.ct}>Carica file Excel GIPO</div><div style={{...cs.g2,marginBottom:14}}><div><div style={{...cs.ct,marginBottom:6}}>File principale</div><UZ loaded={!!fM} fname={fMN} label="Clicca o trascina" sub="Aree + Poliambulatorio" onChange={e=>hFile(e,setFM,setFMN)}/></div><div><div style={{...cs.ct,marginBottom:6}}>File Laboratorio</div><UZ loaded={!!fL} fname={fLN} label="Clicca o trascina" sub="Assegnazioni lab" onChange={e=>hFile(e,setFL,setFLN)}/></div></div><button style={cs.btn()} disabled={!fM||!fL} onClick={calcola}>⚡ Calcola Accettazioni</button></div>
        {cal&&<div style={cs.card}>
          <div style={cs.ct}>Risultati calcolati</div>
          <div style={{...cs.g4,marginBottom:16}}><Stat label="Totale" value={cal.tot.t}/><Stat label="Privati" value={cal.tot.p} sub={(cal.tot.t?Math.round(cal.tot.p/cal.tot.t*100):0)+'%'}/><Stat label="Assicurati" value={cal.tot.a} sub={(cal.tot.t?Math.round(cal.tot.a/cal.tot.t*100):0)+'%'}/><Stat label="Aree attive" value={AREE.filter(a=>cal.aree[a].t>0).length} sub={'su '+AREE.length}/></div>
          <TblRis aree={cal.aree} tot={cal.tot}/>
          {stor.length>0?<><div style={{height:1,background:bord,margin:'16px 0'}}/><div style={cs.ct}>Confronto con settimana precedente ({stor[stor.length-1].label})</div><TblCfr aree={cal.aree} tot={cal.tot} prev={stor[stor.length-1]}/></>:<Al t="w" ch="⚠️ Nessuna settimana precedente in storico."/>}
          <div style={{height:1,background:bord,margin:'16px 0'}}/>
          <div style={{marginBottom:12}}><label style={cs.lbl}>Note (opzionale)</label><textarea style={{...cs.inp,minHeight:70,resize:'vertical'}} value={noteS} onChange={e=>setNoteS(e.target.value)} placeholder="Contesti particolari..."/></div>
          <div style={{display:'flex',gap:10}}><button style={cs.btn(verde)} onClick={()=>genera('sett')}>📝 Genera Audit</button><button style={cs.ol} onClick={salvaSett}>💾 Salva in storico</button></div>
        </div>}
      </>}

      {tab==='mens'&&<>
        <div style={cs.card}><div style={cs.ct}>Periodo</div><div style={cs.g2}><div><label style={cs.lbl}>Mese corrente</label><input type="month" value={rm} onChange={e=>setRm(e.target.value)} style={cs.inp}/></div><div><label style={cs.lbl}>Mese confronto</label><input type="month" value={cm} onChange={e=>setCm(e.target.value)} style={cs.inp}/></div></div></div>
        {prevM&&<Al t="ok" ch={'✓ '+fmtM(cm)+' trovato in storico — '+prevM.tot.t+' accettazioni. Non serve caricare i file del mese precedente.'}/>}
        <div style={cs.card}><div style={cs.ct}>File mese corrente</div><div style={cs.g2}><div><UZ loaded={!!fMM} fname={fMMN} label="File principale" onChange={e=>hFile(e,setFMM,setFMMN)}/></div><div><UZ loaded={!!fML} fname={fMLN} label="File laboratorio" onChange={e=>hFile(e,setFML,setFMLN)}/></div></div></div>
        {!prevM&&<div style={cs.card}><div style={cs.ct}>File mese precedente</div><Al t="w" ch={'⚠️ Nessun dato in storico per '+fmtM(cm)+'. Carica i file.'}/>  <div style={{...cs.g2,marginTop:12}}><div><UZ loaded={!!fPM} fname={fPMN} label="File principale prec." onChange={e=>hFile(e,setFPM,setFPMN)}/></div><div><UZ loaded={!!fPL} fname={fPLN} label="File lab prec." onChange={e=>hFile(e,setFPL,setFPLN)}/></div></div></div>}
        <div style={cs.card}><button style={cs.btn()} onClick={calcolaM}>⚡ Calcola dati mensili</button></div>
        {calM&&<div style={cs.card}>
          <div style={cs.ct}>{fmtM(rm)} vs {fmtM(cm)}</div>
          {(()=>{const ct=calM.curr._tot;const pt=calM.prev._tot||{t:0};const d=ct.t-pt.t;return <div style={{...cs.g4,marginBottom:16}}><Stat label="Totale" value={ct.t}/><Stat label="Privati" value={ct.p} sub={(ct.t?Math.round(ct.p/ct.t*100):0)+'%'}/><Stat label="Assicurati" value={ct.a} sub={(ct.t?Math.round(ct.a/ct.t*100):0)+'%'}/><Stat label="Vs mese prec." value={sg(d)+d} sub={sg(d)+vp(ct.t,pt.t)+'%'} color={d>=0?verde:rosso}/></div>;})()}
          <TblMens curr={calM.curr} prev={calM.prev}/>
          <div style={{height:1,background:bord,margin:'16px 0'}}/>
          <div style={{marginBottom:12}}><label style={cs.lbl}>Note</label><textarea style={{...cs.inp,minHeight:70,resize:'vertical'}} value={noteM} onChange={e=>setNoteM(e.target.value)} placeholder="Contesti particolari..."/></div>
          <div style={{display:'flex',gap:10}}><button style={cs.btn(verde)} onClick={()=>genera('mens')}>📝 Genera Audit Mensile</button><button style={cs.ol} onClick={salvaM2}>💾 Salva in storico</button></div>
        </div>}
      </>}

      {tab==='stor'&&<>
        <div style={{...cs.card,background:'#e8f0fa',borderColor:blu}}>
          <div style={{...cs.ct,color:blu}}>Inserisci dati manualmente nello storico</div>
          <p style={{fontSize:13,color:txt2,marginBottom:12}}>Incolla i dati dalla sezione <strong>Risultati calcolati</strong>.</p>
          <div style={cs.g2}>
            <div><label style={cs.lbl}>Periodo</label><input style={cs.inp} value={pL} onChange={e=>setPL(e.target.value)} placeholder="es. 16/03/2026 — 22/03/2026"/></div>
            <div><label style={cs.lbl}>Tipo</label><div style={{display:'flex',gap:16,marginTop:8}}><label style={{display:'flex',alignItems:'center',gap:6,fontSize:13,cursor:'pointer'}}><input type="radio" name="pto" checked={pT==='s'} onChange={()=>setPT('s')}/> Settimanale</label><label style={{display:'flex',alignItems:'center',gap:6,fontSize:13,cursor:'pointer'}}><input type="radio" name="pto" checked={pT==='m'} onChange={()=>setPT('m')}/> Mensile</label></div></div>
          </div>
          {pT==='m'&&<div style={{marginTop:10}}><label style={cs.lbl}>Mese</label><input type="month" style={cs.inp} value={pMe} onChange={e=>setPMe(e.target.value)}/></div>}
          <div style={{marginTop:12}}><label style={cs.lbl}>Dati</label><textarea style={{...cs.inp,minHeight:100,resize:'vertical'}} value={pTx} onChange={e=>setPTx(e.target.value)} placeholder={"Fisioterapia: 214, privati 214, assicurati 0\nPoliambulatorio: 107, privati 107, assicurati 0\nTOTALE: 502, privati 502, assicurati 0"}/></div>
          {pSt&&<Al t={pSt.t} ch={pSt.m}/>}
          <div style={{display:'flex',gap:10,marginTop:10}}><button style={cs.btn(verde)} onClick={salvaManuale}>💾 Salva nello storico</button><button style={cs.ol} onClick={()=>{setPTx('');setPL('');setPSt(null);}}>🗑 Pulisci</button></div>
        </div>
        <div style={cs.card}><div style={cs.ct}>Storico settimanale ({stor.length})</div>
          {stor.length===0?<div style={{textAlign:'center',padding:32,color:txt3}}>Nessun dato</div>:[...stor].reverse().map((s,i)=><div key={i} style={{display:'flex',alignItems:'center',gap:10,padding:'10px 0',borderBottom:`1px solid ${bord}`}}><div style={{fontSize:13,fontWeight:600,minWidth:190}}>{s.label}</div><div style={{fontSize:13,color:txt2,flex:1}}>Tot: <strong>{s.tot.t}</strong> | Priv: {s.tot.p} | Ass: {s.tot.a}</div><button onClick={()=>{const n=[...stor];n.splice(stor.length-1-i,1);setStor(n);saveS(n);}} style={{background:'none',border:'none',cursor:'pointer',color:txt3,fontSize:14,padding:'3px 7px'}}>✕</button></div>)}
        </div>
        <div style={cs.card}><div style={cs.ct}>Storico mensile ({storM.length})</div>
          {storM.length===0?<div style={{textAlign:'center',padding:32,color:txt3}}>Nessun dato</div>:[...storM].reverse().map((s)=><div key={s.mese} style={{display:'flex',alignItems:'center',gap:10,padding:'10px 0',borderBottom:`1px solid ${bord}`}}><div style={{fontSize:13,fontWeight:700,minWidth:140,textTransform:'capitalize'}}>{s.label}</div><div style={{fontSize:13,color:txt2,flex:1}}>Tot: <strong>{s.tot.t}</strong> | Priv: {s.tot.p} | Ass: {s.tot.a}</div><button onClick={()=>{const n=storM.filter(x=>x.mese!==s.mese);setStorM(n);saveM(n);}} style={{background:'none',border:'none',cursor:'pointer',color:txt3,fontSize:14,padding:'3px 7px'}}>✕</button></div>)}
        </div>
      </>}

      {tab==='imp'&&<div style={cs.card}>
        <div style={cs.ct}>API Key Anthropic</div>
        <Al t="i" ch="Per generare gli audit è necessaria una API Key Anthropic. Viene salvata solo nel suo browser."/>
        <div style={{marginBottom:12}}><label style={cs.lbl}>API Key (inizia con sk-ant-...)</label><input type="password" style={{...cs.inp,fontFamily:'monospace'}} value={akI} onChange={e=>setAkI(e.target.value)} placeholder="sk-ant-api03-..."/></div>
        {ak&&ak.startsWith('sk-ant-')&&<Al t="ok" ch="✓ API Key configurata e attiva."/>}
        <div style={{display:'flex',gap:10}}><button style={cs.btn()} onClick={()=>{localStorage.setItem(AKK,akI.trim());setAk(akI.trim());alert('✓ Salvata.');}}>💾 Salva API Key</button><button style={cs.ol} onClick={()=>window.open('https://console.anthropic.com/settings/keys','_blank')}>🔗 Ottieni API Key</button></div>
        <div style={{height:1,background:bord,margin:'20px 0'}}/>
        <div style={cs.ct}>Come ottenere la API Key</div>
        <ol style={{fontSize:13,color:txt2,lineHeight:1.9,paddingLeft:20}}><li>Vai su <strong>console.anthropic.com</strong></li><li>Accedi o registrati</li><li>Vai su <strong>Settings → API Keys</strong></li><li>Clicca <strong>Create Key</strong></li><li>Incolla qui sopra e salva</li></ol>
      </div>}
    </div>
  </div>;
}

ReactDOM.createRoot(document.getElementById('root')).render(React.createElement(App));
</script>
</body>
</html>
